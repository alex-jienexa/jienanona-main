services:
  # Главный сервис с nginx и объединением всех имеющихся сервисов
  nginx:
    image: nginx:alpine
    container_name: nona_nginx
    ports:
    - "80:80"
    environment:  # Все секреты для регистрации прокси
    - SERVER_NAME=${SERVER_NAME}
    - COOL_PROJECT_HOST=${COOL_PROJECT_HOST}
    - COOL_PROJECT_PORT=${COOL_PROJECT_PORT}
    volumes:
    - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro # Шаблон файла конфигурации
    - ./public:/usr/share/nginx/html:ro                                           # Статика главного узла
    command:
      # Собрать конфиг nginx из переменных окружения
      /bin/sh -c "envsubst '$${SERVER_NAME} $${COOL_PROJECT_HOST} $${COOL_PROJECT_PORT}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - nonanet
    depends_on:
      # Сервис не запустится когда не запустятся эти сервисы - лучше писать все сторонние проекты
      - cool_project
      - foundry
  
  foundry:
    image: node:25
    working_dir: /app
    command: node main.js --dataPath=/data
    volumes:
      # Данные хранятся на сервере
      - /root/foundry/app:/app
      - /root/foundry/data:/data
    networks:
    - nonanet

  # Заглушка пока я не сделаю нормальный сторонний проект
  cool_project:
    image: strm/helloworld-http # Вставить докер имейдж моего проекта
    networks:
      - nonanet

networks:
  nonanet:
    driver: bridge